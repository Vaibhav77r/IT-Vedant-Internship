# ===============================
# APPLICATION
# ===============================
spring.application.name=ims

# ===============================
# DATABASE (Render ENV VARIABLES)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}

# ===============================
# JWT CONFIG
# ===============================
app.jwt.secret=ims_super_secret_key_change_this_in_production_2024
app.jwt.expiration=604800000

# ===============================
# CORS CONFIG
# ===============================
spring.web.cors.allowed-origins=http://localhost:3000,https://ims-frontend-navy.vercel.app
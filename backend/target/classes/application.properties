spring.application.name=ims

# MySQL Database Config
spring.datasource.url=jdbc:mysql://localhost:3306/ims_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Secret & Expiry
app.jwt.secret=ims_super_secret_key_change_this_in_production_2024
app.jwt.expiration=86400000

# Server Port
server.port=8080

# CORS
spring.web.cors.allowed-origins=http://localhost:3000